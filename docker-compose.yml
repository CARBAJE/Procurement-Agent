services:

  # ── Lambda 1: Intention Parser ─────────────────────────────────────────────
  intention-parser:
    build: ./services/intention-parser
    ports:
      - "8001:8001"
    volumes:
      - ./IntentParser:/app/IntentParser    # repo module mounted at runtime
      - ./shared:/app/shared                # shared models
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - COMPLEX_MODEL=qwen3:1.7b
      - SIMPLE_MODEL=qwen3:1.7b
      - PYTHONPATH=/app
    networks:
      - beckn_network

  # ── Lambda 2: Beckn BAP Client ─────────────────────────────────────────────
  beckn-bap-client:
    build:
      context: .                                     # repo root — Dockerfile COPYs shared/
      dockerfile: ./services/beckn-bap-client/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - ONIX_URL=http://onix-bap:8081
      - BAP_URI=http://beckn-bap-client:8002
      - BAP_ID=bap.example.com
      - DOMAIN=beckn.one/testnet
      - CALLBACK_TIMEOUT=10.0
      - CATALOG_NORMALIZER_URL=http://catalog-normalizer:8005
      - REDIS_URL=redis://redis:6379
    networks:
      - beckn_network
    depends_on:
      redis:
        condition: service_healthy
      catalog-normalizer:
        condition: service_started

  # ── Lambda 4: Catalog Normalizer ───────────────────────────────────────────
  catalog-normalizer:
    build:
      context: .
      dockerfile: ./services/catalog-normalizer/Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - ./CatalogNormalizer:/app/CatalogNormalizer   # repo module mounted at runtime
      - ./shared:/app/shared                          # shared models
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - NORMALIZER_MODEL=qwen3:1.7b
      - PYTHONPATH=/app
    networks:
      - beckn_network

  # ── Lambda 3: Comparative & Scoring ────────────────────────────────────────
  comparative-scoring:
    build: ./services/comparative-scoring
    ports:
      - "8003:8003"
    volumes:
      - ./ComparativeScoring:/app/ComparativeScoring   # repo module mounted at runtime
    networks:
      - beckn_network

  # ── Orchestrator: Step Functions local simulator ───────────────────────────
  orchestrator:
    build: ./services/orchestrator
    ports:
      - "8000:8004"   # matches frontend .env.local BAP_URL/INTENT_PARSER_URL defaults
      - "8004:8004"   # keep for direct testing
    environment:
      - INTENTION_PARSER_URL=http://intention-parser:8001
      - BECKN_BAP_URL=http://beckn-bap-client:8002
      - COMPARATIVE_SCORING_URL=http://comparative-scoring:8003
      # Buyer billing — read by _build_billing_info() in workflow.py
      - BUYER_NAME=Infosys Limited - Procurement Desk
      - BUYER_EMAIL=procurement@infosys.com
      - BUYER_PHONE=+91-80-28520261
      - BUYER_ADDRESS_STREET=Electronic City Phase 1
      - BUYER_ADDRESS_CITY=Bangalore
      - BUYER_ADDRESS_STATE=Karnataka
      - BUYER_ADDRESS_AREA_CODE=560100
      - BUYER_ADDRESS_COUNTRY=IND
    networks:
      - beckn_network
    depends_on:
      - intention-parser
      - beckn-bap-client
      - comparative-scoring

  # ── Redis — shared cache for ONIX adapters ─────────────────────────────────
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - beckn_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── onix-bap — BAP ONIX adapter ────────────────────────────────────────────
  #   Caller  (outbound): http://onix-bap:8081/bap/caller/
  #   Receiver (inbound): http://onix-bap:8081/bap/receiver/
  #   BAPCaller.yaml   → routes discover to beckn-bap-client:8002/bpp/discover
  #   BAPReceiver.yaml → routes on_* callbacks to beckn-bap-client:8002/bap/receiver
  onix-bap:
    image: fidedocker/onix-adapter
    container_name: onix-bap
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    volumes:
      - ./config:/app/config
    command: ["./server", "--config=/app/config/generic-bap.yaml"]

  # ── onix-bpp — BPP ONIX adapter ────────────────────────────────────────────
  #   Caller  (outbound): http://onix-bpp:8082/bpp/caller/
  #   Receiver (inbound): http://onix-bpp:8082/bpp/receiver/
  onix-bpp:
    image: fidedocker/onix-adapter
    container_name: onix-bpp
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    volumes:
      - ./config:/app/config
    command: ["./server", "--config=/app/config/generic-bpp.yaml"]

  # ── sandbox-bpp — mock BPP application ────────────────────────────────────
  #   Receives action requests at: http://sandbox-bpp:3002/api/webhook
  sandbox-bpp:
    container_name: sandbox-bpp
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3002
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - beckn_network

networks:
  beckn_network:
    name: beckn_network
    driver: bridge
